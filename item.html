<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Item — Niko & Co</title>
  <link rel="stylesheet" href="normalize.css">
  <link rel="stylesheet" href="main.css">
  <link href="https://fonts.googleapis.com/css2?family=Goldman:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Gajraj+One&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>

<header class="site-header">
  <nav class="nav container">
    <div class="header-left">
      <a href="index.html" class="logo">Niko & Co</a> 
    </div>
    <ul class="menu">
      <li><a href="shop.html">Shop</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <div class="header-right">
      <a href="cart.html" class="cart-icon">
        <i class="fas fa-shopping-cart"></i>
        <span class="cart-count">0</span> 
      </a>
    </div>
  </nav>
</header>

<a href="#" class="back-btn" onclick="history.back(); return false;">
  ← Back
</a>

<main class="container item-layout">
  <div class="item-image">
    <img id="item-img" src="" alt="">
  </div>
  <div class="item-details">
    <h1 id="item-name"></h1>
    <p id="item-description"></p>
    <p id="item-price"></p>
    <button id="add-btn" class="btn">Add to Cart</button>
  </div>
</main>

<footer class="site-footer">
  <p>© 2026 Niko & Co</p>
</footer>

<!-- Scripts -->
<script src="product.js"></script>
<script src="cart.js"></script>
<script>
  function loadProduct() {
    const params = new URLSearchParams(window.location.search);
    let id = params.get("id");

    // Set default item ID if none provided or invalid
    if (!id || !product[id]) {
      id = "item1"; // <-- replace "item1" with your default product's key
    }

    const p = product[id];

    document.getElementById("item-name").textContent = p.name;
    document.getElementById("item-description").textContent = p.description;
    document.getElementById("item-price").textContent = `$${p.price}`;
    document.getElementById("item-img").src = p.image;
    document.getElementById("item-img").alt = p.name;
  }

  document.addEventListener("DOMContentLoaded", loadProduct);
</script>

</body>
</html>
